<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Wheel Tool</title>
  <style>
    :root {
      --bg: #f2f2ec;
      --paper: #f7f4eb;
      --panel: #ffffff;
      --line: #111111;
      --text: #111111;
      --muted: #4a4a4a;
      --red: #d7261e;
      --blue: #1155cc;
      --yellow: #f2c300;
      --gray-1: #e6e1d7;
      --gray-2: #c8c2b8;
      --gray-3: #7f7b74;
      --focus: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Futura", "Montserrat", "Avenir Next", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      letter-spacing: 0.01em;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: min(26vw, 320px);
      height: min(26vw, 320px);
      border: 8px solid var(--line);
      background: var(--yellow);
      top: -72px;
      right: -96px;
    }

    body::after {
      width: 0;
      height: 0;
      border-left: 0 solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 240px solid var(--red);
      left: -18px;
      bottom: 36px;
      transform: rotate(-12deg);
    }

    .app {
      max-width: 1240px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    header {
      border: 4px solid var(--line);
      background: var(--paper);
      padding: 26px 24px 20px 112px;
      display: grid;
      gap: 4px;
      min-height: 124px;
      align-content: center;
      position: relative;
      overflow: hidden;
    }

    header::before,
    header::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    header::before {
      width: 108px;
      height: 108px;
      border: 4px solid var(--line);
      background: var(--blue);
      left: -24px;
      top: 10px;
      transform: rotate(45deg);
    }

    header::after {
      width: 34px;
      height: 34px;
      background: var(--red);
      right: 26px;
      top: 18px;
    }

    h1 {
      margin: 0;
      width: fit-content;
      font-size: clamp(2rem, 3vw, 3.6rem);
      font-weight: 800;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      max-width: calc(100% - 180px);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 34ch;
      text-transform: uppercase;
      line-height: 1.35;
      position: absolute;
      right: 24px;
      bottom: 14px;
      text-align: right;
    }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 1.45fr) minmax(280px, 0.78fr);
      gap: 18px;
      align-items: stretch;
    }

    .wheel-section,
    .info-panel,
    .harmony-section {
      border: 4px solid var(--line);
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }

    .wheel-section {
      padding: 24px 24px 20px;
      min-height: clamp(520px, 58vw, 720px);
      background: var(--paper);
      height: 100%;
    }

    .wheel-section::before,
    .wheel-section::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .wheel-section::before {
      content: none;
    }

    .wheel-section::after {
      content: none;
    }

    .wheel-wrap {
      width: var(--wheel-size, min(100%, 560px));
      height: var(--wheel-size, min(100%, 560px));
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    #wheel {
      width: 100%;
      max-width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background: transparent;
      outline: none;
    }

    .grayscale-bar {
      width: clamp(28px, 5vw, 40px);
      height: clamp(220px, 34vw, 290px);
      display: grid;
      grid-template-rows: repeat(10, minmax(0, 1fr));
      gap: 6px;
      padding: 8px;
      border: 4px solid var(--line);
      background: var(--yellow);
      position: absolute;
      left: 24px;
      bottom: 20px;
      z-index: 2;
    }

    .gray-chip {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 2px solid var(--line);
      padding: 0;
      position: relative;
      appearance: none;
    }

    .gray-chip.is-selected {
      outline: 4px solid var(--red);
      outline-offset: 2px;
    }

    .gray-chip[data-tip]:hover::after,
    .gray-chip[data-tip]:focus-visible::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--line);
      color: #ffffff;
      font-size: 0.75rem;
      font-family: "SF Mono", "Roboto Mono", "Menlo", monospace;
      padding: 5px 7px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      border: 2px solid #ffffff;
    }

    .info-panel {
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
      align-content: start;
      background: var(--panel);
      height: 100%;
    }

    .preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 4px solid var(--line);
      background: #ff0000;
      position: relative;
    }

    .preview::after {
      content: none;
    }

    .stats {
      display: grid;
      gap: 0;
      font-size: 0.95rem;
      border: 4px solid var(--line);
      background: var(--paper);
    }

    .stat-row {
      display: grid;
      grid-template-columns: 144px minmax(0, 1fr);
      gap: 0;
      align-items: center;
      min-height: 54px;
      border-top: 2px solid var(--line);
    }

    .stat-row:first-child {
      border-top: 0;
    }

    .label {
      color: var(--line);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 144px;
      max-width: 144px;
      border-right: 2px solid var(--line);
      background: var(--yellow);
    }

    .value {
      font-family: "SF Mono", "Roboto Mono", "Menlo", monospace;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 14px;
      min-width: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 46px;
      border: 3px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background-color 100ms ease, color 100ms ease;
      box-shadow: none;
    }

    button:hover {
      background: var(--line);
      color: #ffffff;
    }

    button:focus-visible,
    #wheel:focus-visible {
      outline: 4px solid var(--blue);
      outline-offset: 2px;
    }

    button:disabled {
      background: var(--gray-1);
      color: var(--gray-3);
      cursor: not-allowed;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      color: var(--line);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .harmony-section {
      padding: 18px;
      display: grid;
      gap: 14px;
      background: var(--paper);
    }

    .swatch-row {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 8px;
    }

    .chip {
      height: 56px;
      border: 3px solid var(--line);
      cursor: pointer;
      transition: transform 100ms ease;
      position: relative;
      min-height: 56px;
    }

    .chip:hover {
      transform: translate(-3px, -3px);
    }

    .chip[data-tip]:hover::after,
    .chip[data-tip]:focus-visible::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      background: var(--line);
      color: #ffffff;
      font-size: 0.75rem;
      font-family: "SF Mono", "Roboto Mono", "Menlo", monospace;
      padding: 5px 7px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      border: 2px solid #ffffff;
    }

    .harmony-grid {
      display: grid;
      gap: 12px;
    }

    .harmony-line {
      display: grid;
      grid-template-columns: 134px 1fr;
      align-items: center;
      gap: 0;
      border: 4px solid var(--line);
      background: #ffffff;
    }

    .harmony-label {
      color: var(--line);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 12px;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: var(--yellow);
      border-right: 4px solid var(--line);
    }

    .harmony-swatches {
      display: grid;
      gap: 0;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      padding: 0;
    }

    .harmony-swatches .chip + .chip {
      border-left-width: 0;
    }

    .canvas-tip {
      position: fixed;
      background: var(--line);
      color: #ffffff;
      font-size: 0.75rem;
      font-family: "SF Mono", "Roboto Mono", "Menlo", monospace;
      padding: 5px 8px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -130%);
      transition: opacity 120ms ease;
      z-index: 40;
      border: 2px solid #ffffff;
    }

    .canvas-tip.show {
      opacity: 1;
    }

    #copyBtn {
      background: var(--red);
      color: #ffffff;
    }

    #copyBtn:hover:not(:disabled) {
      background: #ffffff;
      color: var(--line);
    }

    #downloadBtn {
      background: var(--blue);
      color: #ffffff;
    }

    #downloadBtn:hover {
      background: var(--yellow);
      color: var(--line);
    }

    @media (max-width: 900px) {
      body {
        padding: 16px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .wheel-section {
        min-height: 0;
        height: auto;
        min-height: clamp(480px, 64vw, 640px);
      }

      .info-panel {
        grid-template-columns: 110px 1fr;
        grid-template-rows: auto auto;
        align-items: start;
        height: auto;
      }

      .preview {
        width: 110px;
      }

      .actions {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      body::before {
        width: 160px;
        height: 160px;
        right: -72px;
        top: -54px;
      }

      body::after {
        border-right-width: 96px;
        border-bottom-width: 140px;
      }

      header {
        padding: 118px 16px 82px 16px;
        min-height: 0;
        gap: 14px;
        align-content: start;
      }

      header::before {
        width: 88px;
        height: 88px;
        left: 10px;
        top: -16px;
      }

      header::after {
        width: 24px;
        height: 24px;
        right: 14px;
        top: 14px;
      }

      h1 {
        position: relative;
        z-index: 1;
        margin-top: 10px;
        margin-right: 44px;
        max-width: none;
        font-size: clamp(1.8rem, 9vw, 2.6rem);
        line-height: 1;
      }

      .subtitle {
        position: absolute;
        right: 16px;
        bottom: 18px;
        z-index: 1;
        margin-top: 0;
        max-width: 26ch;
        padding-right: 0;
        text-align: right;
      }

      .wheel-section {
        min-height: clamp(420px, 96vw, 560px);
        padding: 18px 14px 82px;
      }

      .wheel-wrap {
        max-width: calc(100% - 28px);
        max-height: calc(100% - 96px);
      }

      .grayscale-bar {
        left: 14px;
        bottom: 14px;
        width: min(calc(100% - 28px), 320px);
        height: auto;
        grid-template-rows: none;
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .gray-chip {
        min-height: 32px;
      }

      .info-panel {
        grid-template-columns: 1fr;
        grid-template-rows: none;
      }

      .preview {
        width: 100%;
      }

      .stat-row {
        grid-template-columns: 144px minmax(0, 1fr);
      }

      .harmony-line {
        grid-template-columns: 1fr;
      }

      .harmony-label {
        border-right: 0;
        border-bottom: 4px solid var(--line);
      }

      .chip {
        height: 48px;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Color Wheel Tool</h1>
      <p class="subtitle">HSB wheel with harmony swatches and export-ready color details.</p>
    </header>

    <main>
      <section class="wheel-section" aria-label="Color Wheel">
        <div id="grayscaleBar" class="grayscale-bar" aria-label="Grayscale colors"></div>
        <div class="wheel-wrap">
          <canvas id="wheel" tabindex="0" aria-label="Color wheel canvas"></canvas>
        </div>
      </section>

      <section class="info-panel" aria-label="Selected Color Information">
        <div id="preview" class="preview"></div>

        <div class="stats">
          <div class="stat-row"><span class="label">HEX</span><span class="value" id="hexValue">#FF0000</span></div>
          <div class="stat-row"><span class="label">RGB</span><span class="value" id="rgbValue">rgb(255, 0, 0)</span></div>
          <div class="stat-row"><span class="label">HSL</span><span class="value" id="hslValue">hsl(0, 100%, 50%)</span></div>
          <div class="stat-row"><span class="label">Hue</span><span class="value" id="hueValue">0deg</span></div>
          <div class="stat-row"><span class="label">Brightness</span><span class="value" id="brightnessValue">100%</span></div>
        </div>

        <div class="actions">
          <button id="copyBtn" type="button">Copy HEX</button>
          <button id="downloadBtn" type="button">Download PNG</button>
        </div>
      </section>
    </main>

    <!-- Fine Adjustments section removed -->

    <section class="harmony-section" aria-label="Harmony Colors">
      <h2 class="section-title">Harmony</h2>
      <div id="harmonyGrid" class="harmony-grid"></div>
    </section>
  </div>

  <div id="canvasTip" class="canvas-tip" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const USE_BOOK_PALETTE = true;
      const HUE_SEGMENTS = 12;
      const SEGMENTS = HUE_SEGMENTS;
      const RINGS = 8;
      const SATURATION = 1;
      const TAU = Math.PI * 2;
      const START_ANGLE = -Math.PI / 2;
      const GEOMETRY_EPSILON = 1e-6;
      const GRAYSCALE_VALUES = [
        "#E6E6E6",
        "#CCCCCC",
        "#B3B3B3",
        "#A6A6A6",
        "#8C8C8C",
        "#737373",
        "#595959",
        "#404040",
        "#262626",
        "#000000"
      ];
      const HARMONY_GROUPS = [
        { name: "Complementary", offsets: [180] },
        { name: "Triadic", offsets: [120, -120] },
        { name: "Analogous", offsets: [30, -30] }
      ];
      const BOOK_WHEEL = [
        ["#8C0000", "#BF0000", "#D90000", "#FF0000", "#FF264D", "#FF5980", "#FF8CB2", "#FFCCE6"],
        ["#8C0E1C", "#BF1326", "#D9162B", "#FF1A33", "#FF4D59", "#FF7380", "#FF99A6", "#FFCCCC"],
        ["#8C3800", "#BF4D00", "#D95700", "#FF6600", "#FF8033", "#FF9966", "#FFBF99", "#FFD9CC"],
        ["#8C5400", "#BF7300", "#D98200", "#FF9900", "#FFB333", "#FFBF66", "#FFD999", "#FFE6CC"],
        ["#8C8C00", "#BFBF00", "#D9D900", "#FFFF00", "#FFFF33", "#FFFF66", "#FFFF99", "#FFFFBF"],
        ["#388C00", "#4CBF00", "#57D900", "#66FF00", "#80FF33", "#A6FF66", "#BFFF99", "#E0FFCC"],
        ["#008C0E", "#00BF13", "#00D916", "#00FF19", "#33FF40", "#66FF73", "#8CFFA6", "#BFFFCC"],
        ["#008C54", "#00BF73", "#00D982", "#00FF99", "#33FFB2", "#66FFBF", "#8CFFCC", "#BFFFE6"],
        ["#00388C", "#004CBF", "#0057D9", "#0066FF", "#2680FF", "#5999FF", "#80BFFF", "#B2D9FF"],
        ["#000E8C", "#0013BF", "#0016D9", "#0019FF", "#2633FF", "#4059FF", "#6673FF", "#8C99FF"],
        ["#1C008C", "#2600BF", "#2B00D9", "#3300FF", "#5926FF", "#7359FF", "#9980FF", "#BFB2FF"],
        ["#54008C", "#7300BF", "#8200D9", "#9900FF", "#A633FF", "#BF66FF", "#CC99FF", "#E6CCFF"]
      ];

      const state = {
        hue: 0,
        brightness: 1,
        selectedSegment: 0,
        selectedGrayHex: "",
        selectionMode: "wheel",
        hasExplicitSelection: false,
        harmonyPoints: [],
        dpr: window.devicePixelRatio || 1,
        size: 0,
        center: 0,
        radius: 0,
        innerRadius: 0,
        wheelThickness: 0,
        ringWidth: 0,
        segmentStep: TAU / SEGMENTS,
        segmentMidpointInset: 0,
        ringRadii: [],
        ringBrightnesses: [],
        wheelBuffer: document.createElement("canvas")
      };

      const canvas = document.getElementById("wheel");
      const ctx = canvas.getContext("2d");
      const wheelSection = document.querySelector(".wheel-section");
      const wheelWrap = document.querySelector(".wheel-wrap");

      const previewEl = document.getElementById("preview");
      const hexValueEl = document.getElementById("hexValue");
      const rgbValueEl = document.getElementById("rgbValue");
      const hslValueEl = document.getElementById("hslValue");
      const hueValueEl = document.getElementById("hueValue");
      const brightnessValueEl = document.getElementById("brightnessValue");
      const harmonyGridEl = document.getElementById("harmonyGrid");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const canvasTip = document.getElementById("canvasTip");
      const grayscaleBarEl = document.getElementById("grayscaleBar");
      let resizeFrame = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function wrapHue(value) {
        const wrapped = value % 1;
        return wrapped < 0 ? wrapped + 1 : wrapped;
      }

      function segmentSupportsHue(segment) {
        return segment >= 0 && segment < HUE_SEGMENTS;
      }

      function hueForSegment(segment) {
        return segmentSupportsHue(segment) ? segment / HUE_SEGMENTS : 0;
      }

      function segmentIndexForHue(hue) {
        return Math.round(wrapHue(hue) * HUE_SEGMENTS) % HUE_SEGMENTS;
      }

      function brightnessForRing(ringIndex) {
        const linear = 1 - ringIndex / (RINGS - 1);
        return 0.1 + 0.9 * Math.pow(linear, 0.8);
      }

      function snapRadius(value) {
        return Math.round(value * 2) / 2;
      }

      function normalizeAngle(angle) {
        const wrapped = angle % TAU;
        return wrapped < 0 ? wrapped + TAU : wrapped;
      }

      function angleForSegmentStart(segment) {
        return START_ANGLE + segment * state.segmentStep;
      }

      function angleForSegmentMidpoint(segment) {
        return angleForSegmentStart(segment) + state.segmentStep * 0.5;
      }

      function getRingGeometry(ring) {
        const inner = state.ringRadii[ring];
        const outer = state.ringRadii[ring + 1];
        return {
          inner,
          outer,
          mid: inner + (outer - inner) * 0.5
        };
      }

      function hsbToRgb(h, s, v) {
        const i = Math.floor(h * 6);
        const f = h * 6 - i;
        const p = v * (1 - s);
        const q = v * (1 - f * s);
        const t = v * (1 - (1 - f) * s);
        let r = 0;
        let g = 0;
        let b = 0;

        switch (i % 6) {
          case 0: r = v; g = t; b = p; break;
          case 1: r = q; g = v; b = p; break;
          case 2: r = p; g = v; b = t; break;
          case 3: r = p; g = q; b = v; break;
          case 4: r = t; g = p; b = v; break;
          default: r = v; g = p; b = q; break;
        }

        return {
          r: Math.round(clamp(r, 0, 1) * 255),
          g: Math.round(clamp(g, 0, 1) * 255),
          b: Math.round(clamp(b, 0, 1) * 255)
        };
      }

      function rgbToHex(rgb) {
        const toHex = (n) => n.toString(16).padStart(2, "0").toUpperCase();
        return `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;
      }

      function hexToRgb(hex) {
        if (!hex || typeof hex !== "string") {
          return null;
        }
        const cleaned = hex.replace("#", "").trim();
        if (cleaned.length === 3) {
          const r = parseInt(cleaned[0] + cleaned[0], 16);
          const g = parseInt(cleaned[1] + cleaned[1], 16);
          const b = parseInt(cleaned[2] + cleaned[2], 16);
          return { r, g, b };
        }
        if (cleaned.length !== 6) {
          return null;
        }
        const r = parseInt(cleaned.slice(0, 2), 16);
        const g = parseInt(cleaned.slice(2, 4), 16);
        const b = parseInt(cleaned.slice(4, 6), 16);
        if ([r, g, b].some((value) => Number.isNaN(value))) {
          return null;
        }
        return { r, g, b };
      }

      function paletteRgbForSegment(segment, ringIndex) {
        if (!USE_BOOK_PALETTE) {
          return null;
        }
        const ring = clamp(ringIndex, 0, RINGS - 1);
        const row = BOOK_WHEEL[segment];
        if (!row) {
          return null;
        }
        const paletteSteps = row.length - 1;
        const paletteRing = paletteSteps - Math.round((ring / Math.max(1, RINGS - 1)) * paletteSteps);
        const hex = row[paletteRing];
        return hex ? hexToRgb(hex) : null;
      }

      function paletteRgbFor(hue, ringIndex) {
        return paletteRgbForSegment(segmentIndexForHue(hue), ringIndex);
      }

      function rgbToHsl(r, g, b) {
        const rn = r / 255;
        const gn = g / 255;
        const bn = b / 255;
        const max = Math.max(rn, gn, bn);
        const min = Math.min(rn, gn, bn);
        const l = (max + min) / 2;
        const delta = max - min;

        if (delta === 0) {
          return { h: 0, s: 0, l: Math.round(l * 100) };
        }

        const s = delta / (1 - Math.abs(2 * l - 1));
        let h;

        switch (max) {
          case rn:
            h = ((gn - bn) / delta) % 6;
            break;
          case gn:
            h = (bn - rn) / delta + 2;
            break;
          default:
            h = (rn - gn) / delta + 4;
            break;
        }

        const hd = Math.round((h * 60 + 360) % 360);
        return {
          h: hd,
          s: Math.round(s * 100),
          l: Math.round(l * 100)
        };
      }

      function selectionColor() {
        if (state.selectionMode === "grayscale" && state.selectedGrayHex) {
          return hexToRgb(state.selectedGrayHex);
        }
        const ring = getNearestRingForBrightness(state.brightness);
        const paletteRgb = paletteRgbForSegment(state.selectedSegment, ring);
        return paletteRgb || hsbToRgb(hueForSegment(state.selectedSegment), SATURATION, state.brightness);
      }

      function selectionHex() {
        return rgbToHex(selectionColor());
      }

      function getQueryState() {
        const params = new URLSearchParams(window.location.search);
        const gray = params.get("gray");
        const h = Number(params.get("h"));
        const b = Number(params.get("b"));

        if (gray) {
          const normalizedGray = `#${gray.replace("#", "").toUpperCase()}`;
          if (GRAYSCALE_VALUES.includes(normalizedGray)) {
            state.selectedGrayHex = normalizedGray;
            state.selectionMode = "grayscale";
            return;
          }
        }

        if (!Number.isNaN(h)) {
          state.hue = wrapHue(h / 360);
          state.selectedSegment = segmentIndexForHue(state.hue);
          state.selectionMode = "wheel";
        }

        if (!Number.isNaN(b)) {
          state.brightness = clamp(b, 0.1, 1);
        }
      }

      function updateUrl() {
        const params = new URLSearchParams(window.location.search);
        if (state.selectionMode === "grayscale" && state.selectedGrayHex) {
          params.set("gray", state.selectedGrayHex.slice(1));
          params.delete("h");
          params.delete("b");
        } else {
          params.set("h", String(Math.round(state.hue * 360)));
          params.set("b", state.brightness.toFixed(3));
          params.delete("gray");
        }
        const query = params.toString();
        const next = `${window.location.pathname}?${query}`;
        window.history.replaceState(null, "", next);
      }

      function updateCopyButtonState() {
        copyBtn.disabled = !state.hasExplicitSelection;
        copyBtn.setAttribute("aria-disabled", String(!state.hasExplicitSelection));
        copyBtn.title = state.hasExplicitSelection ? "Copy selected HEX" : "Select a color first";
      }

      function setSelection(h, b, explicit) {
        state.selectedSegment = segmentIndexForHue(h);
        state.hue = hueForSegment(state.selectedSegment);
        state.brightness = clamp(b, 0.1, 1);
        state.selectionMode = "wheel";
        state.selectedGrayHex = "";
        renderHarmony();
        renderSelectionLayer();
        renderInfoPanel();
        renderGrayscaleBar();
        if (explicit === true) {
          state.hasExplicitSelection = true;
        }
        updateCopyButtonState();
        updateUrl();
      }

      function setSelectionBySegment(segment, b, explicit) {
        state.selectedSegment = clamp(segment, 0, SEGMENTS - 1);
        state.hue = hueForSegment(state.selectedSegment);
        state.brightness = clamp(b, 0.1, 1);
        state.selectionMode = "wheel";
        state.selectedGrayHex = "";
        renderHarmony();
        renderSelectionLayer();
        renderInfoPanel();
        renderGrayscaleBar();
        if (explicit === true) {
          state.hasExplicitSelection = true;
        }
        updateCopyButtonState();
        updateUrl();
      }

      function setSelectionByGrayHex(hex, explicit) {
        const rgb = hexToRgb(hex);
        if (!rgb) {
          return;
        }
        state.selectionMode = "grayscale";
        state.selectedGrayHex = hex;
        state.harmonyPoints = [];
        renderHarmony();
        renderSelectionLayer();
        renderInfoPanel();
        renderGrayscaleBar();
        if (explicit === true) {
          state.hasExplicitSelection = true;
        }
        updateCopyButtonState();
        updateUrl();
      }

      async function copyHexValue(hex, feedback) {
        try {
          await navigator.clipboard.writeText(hex);
          if (feedback) {
            copyBtn.textContent = "Copied";
            setTimeout(function () {
              copyBtn.textContent = "Copy HEX";
            }, 900);
          }
          return true;
        } catch (_error) {
          if (feedback) {
            copyBtn.textContent = "Unavailable";
            setTimeout(function () {
              copyBtn.textContent = "Copy HEX";
            }, 1200);
          }
          return false;
        }
      }

      function initCanvasSize() {
        const sectionRect = wheelSection.getBoundingClientRect();
        const grayscaleRect = grayscaleBarEl.getBoundingClientRect();
        const styles = window.getComputedStyle(wheelSection);
        const paddingLeft = parseFloat(styles.paddingLeft) || 0;
        const paddingRight = parseFloat(styles.paddingRight) || 0;
        const paddingTop = parseFloat(styles.paddingTop) || 0;
        const paddingBottom = parseFloat(styles.paddingBottom) || 0;
        const compactLayout = window.matchMedia("(max-width: 640px)").matches;
        const safetyInset = compactLayout ? 20 : 28;
        const grayscaleGap = compactLayout ? 18 : 28;
        const availableWidth = sectionRect.width - paddingLeft - paddingRight - safetyInset * 2;
        const availableHeight = sectionRect.height - paddingTop - paddingBottom - safetyInset * 2;
        const widthLimitFromGray = compactLayout
          ? availableWidth
          : availableWidth - grayscaleRect.width - grayscaleGap;
        const heightLimitFromGray = compactLayout
          ? availableHeight - grayscaleRect.height - grayscaleGap
          : availableHeight;
        const proportionalCap = compactLayout ? sectionRect.width * 0.8 : sectionRect.width * 0.7;
        const cssSize = Math.floor(Math.min(
          availableWidth,
          availableHeight,
          widthLimitFromGray,
          heightLimitFromGray,
          proportionalCap
        ));

        if (cssSize <= 0) {
          return;
        }

        wheelWrap.style.setProperty("--wheel-size", `${cssSize}px`);

        const dpr = window.devicePixelRatio || 1;
        const pixelSize = Math.max(1, Math.floor(cssSize * dpr));

        state.dpr = dpr;
        state.size = pixelSize;
        state.center = pixelSize / 2;
        state.radius = pixelSize / 2;
        state.innerRadius = snapRadius(state.radius * 0.3);
        state.wheelThickness = snapRadius(state.radius - state.innerRadius);
        state.ringWidth = state.wheelThickness / RINGS;
        state.segmentMidpointInset = Math.min(state.segmentStep * 0.02, Math.PI / 720);
        state.ringBrightnesses = Array.from({ length: RINGS }, function (_value, ring) {
          return brightnessForRing(ring);
        });
        state.ringRadii = Array.from({ length: RINGS + 1 }, function (_value, index) {
          const raw = state.innerRadius + index * state.ringWidth;
          return index === RINGS ? state.radius : snapRadius(raw);
        });

        canvas.width = pixelSize;
        canvas.height = pixelSize;
        canvas.style.width = `${cssSize}px`;
        canvas.style.height = `${cssSize}px`;

        state.wheelBuffer.width = pixelSize;
        state.wheelBuffer.height = pixelSize;
      }

      function drawWheelBitmap() {
        const bctx = state.wheelBuffer.getContext("2d");
        bctx.clearRect(0, 0, state.size, state.size);
        bctx.globalCompositeOperation = "destination-over";
        bctx.fillStyle = "rgba(0,0,0,0)";
        bctx.fillRect(0, 0, state.size, state.size);
        bctx.globalCompositeOperation = "source-over";
        const center = state.center;

        for (let ring = 0; ring < RINGS; ring += 1) {
          const { inner, outer } = getRingGeometry(ring);
          const brightness = state.ringBrightnesses[ring];

          for (let segment = 0; segment < SEGMENTS; segment += 1) {
            const start = angleForSegmentStart(segment);
            const end = start + state.segmentStep;
            const hue = hueForSegment(segment);
            const paletteRgb = paletteRgbForSegment(segment, ring);
            const rgb = paletteRgb || hsbToRgb(hue, SATURATION, brightness);

            bctx.beginPath();
            bctx.arc(center, center, outer, start, end);
            bctx.arc(center, center, Math.max(0, inner), end, start, true);
            bctx.closePath();
            bctx.fillStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            bctx.fill();
          }
        }
      }

      function getCurrentIndices() {
        return {
          segment: clamp(state.selectedSegment, 0, SEGMENTS - 1),
          ring: getNearestRingForBrightness(state.brightness)
        };
      }

      function getNearestRingForBrightness(brightness) {
        let bestRing = 0;
        let bestDiff = Infinity;

        for (let ring = 0; ring < RINGS; ring += 1) {
          const diff = Math.abs(brightness - state.ringBrightnesses[ring]);
          if (diff < bestDiff) {
            bestDiff = diff;
            bestRing = ring;
          }
        }

        return bestRing;
      }

      function pointForSegmentRing(segment, ring) {
        const { inner, outer, mid } = getRingGeometry(ring);
        const angle = angleForSegmentMidpoint(segment);
        const radius = inner === outer ? mid : (2 / 3) * ((outer * outer * outer) - (inner * inner * inner)) / ((outer * outer) - (inner * inner));
        return {
          x: state.center + Math.cos(angle) * radius,
          y: state.center + Math.sin(angle) * radius
        };
      }

      function drawHarmonyMarkers() {
        if (!state.harmonyPoints.length) {
          return;
        }

        const base = Math.max(2, state.dpr * 2.25);

        for (const point of state.harmonyPoints) {
          const pos = pointForSegmentRing(point.segment, point.ring);
          drawMarker(pos.x, pos.y, base, point.hex);
        }
      }

      function drawMarker(x, y, radius, fill) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, radius + Math.max(1, state.dpr * 0.8), 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 0, 0, 0.8)";
        ctx.lineWidth = Math.max(1, state.dpr);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, Math.max(1, radius - Math.max(0.6, state.dpr * 0.5)), 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.lineWidth = Math.max(1, state.dpr * 0.8);
        ctx.stroke();
      }

      function drawSelectionIndicator() {
        if (state.selectionMode !== "wheel") {
          return;
        }
        const { segment, ring } = getCurrentIndices();
        const { inner, outer } = getRingGeometry(ring);
        const start = angleForSegmentStart(segment);
        const end = start + state.segmentStep;

        const drawStroke = (color, lineWidth) => {
          ctx.beginPath();
          ctx.arc(state.center, state.center, outer, start, end);
          ctx.arc(state.center, state.center, inner, end, start, true);
          ctx.closePath();
          ctx.strokeStyle = color;
          ctx.lineWidth = lineWidth;
          ctx.stroke();
        };

        drawStroke("rgba(0, 0, 0, 0.88)", Math.max(1.5, state.dpr * 1.5));
        drawStroke("rgba(255, 255, 255, 0.96)", Math.max(1, state.dpr));

        const pos = pointForSegmentRing(segment, ring);
        drawMarker(pos.x, pos.y, Math.max(2.4, state.dpr * 2.5), selectionHex());
      }

      function renderSelectionLayer() {
        ctx.clearRect(0, 0, state.size, state.size);
        ctx.drawImage(state.wheelBuffer, 0, 0);
        drawHarmonyMarkers();
        drawSelectionIndicator();
      }

      function renderInfoPanel() {
        const rgb = selectionColor();
        const hex = rgbToHex(rgb);
        const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
        const isGray = state.selectionMode === "grayscale";
        const hueDeg = isGray ? 0 : Math.round(state.hue * 360) % 360;
        const brightnessPct = isGray ? Math.round((Math.max(rgb.r, rgb.g, rgb.b) / 255) * 100) : Math.round(state.brightness * 100);

        previewEl.style.backgroundColor = hex;
        hexValueEl.textContent = hex;
        rgbValueEl.textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        hslValueEl.textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        hueValueEl.textContent = isGray ? "Gray" : `${hueDeg}deg`;
        brightnessValueEl.textContent = `${brightnessPct}%`;
      }

      function makeChip(hex, onClick) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.style.backgroundColor = hex;
        chip.setAttribute("data-tip", hex);
        chip.setAttribute("aria-label", `Select ${hex}`);
        chip.addEventListener("click", onClick);
        return chip;
      }

      function renderHarmony() {
        harmonyGridEl.textContent = "";
        state.harmonyPoints = [];
        if (state.selectionMode !== "wheel") {
          return;
        }
        const { segment: baseSegment, ring } = getCurrentIndices();
        const harmonyBrightness = state.ringBrightnesses[ring];

        for (const group of HARMONY_GROUPS) {
          const line = document.createElement("div");
          line.className = "harmony-line";

          const label = document.createElement("div");
          label.className = "harmony-label";
          label.textContent = group.name;

          const swatches = document.createElement("div");
          swatches.className = "harmony-swatches";

          for (const offset of group.offsets) {
            const segmentOffset = Math.round((offset / 360) * HUE_SEGMENTS);
            const segment = (baseSegment + segmentOffset + SEGMENTS) % SEGMENTS;
            const segmentHue = hueForSegment(segment);
            const paletteRgb = paletteRgbForSegment(segment, ring);
            const rgb = paletteRgb || hsbToRgb(segmentHue, SATURATION, harmonyBrightness);
            const hex = rgbToHex(rgb);
            state.harmonyPoints.push({ segment, ring, hex });
            swatches.appendChild(makeChip(hex, function () {
              setSelectionBySegment(segment, harmonyBrightness, true);
              copyHexValue(hex, false);
            }));
          }

          line.appendChild(label);
          line.appendChild(swatches);
          harmonyGridEl.appendChild(line);
        }
      }

      function renderGrayscaleBar() {
        grayscaleBarEl.textContent = "";

        for (const hex of GRAYSCALE_VALUES) {
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "gray-chip";
          if (state.selectionMode === "grayscale" && state.selectedGrayHex === hex) {
            chip.classList.add("is-selected");
          }
          chip.style.backgroundColor = hex;
          chip.setAttribute("data-tip", hex);
          chip.setAttribute("aria-label", `Select grayscale ${hex}`);
          chip.title = hex;
          chip.addEventListener("click", function () {
            setSelectionByGrayHex(hex, true);
            copyHexValue(hex, false);
          });
          grayscaleBarEl.appendChild(chip);
        }
      }

      function pickFromCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const cssRadius = rect.width / 2;
        const innerRadiusCss = (state.ringRadii[0] / state.radius) * cssRadius;
        const outerRadiusCss = (state.ringRadii[RINGS] / state.radius) * cssRadius;
        const dx = x - cssRadius;
        const dy = y - cssRadius;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > outerRadiusCss - GEOMETRY_EPSILON || distance < innerRadiusCss + GEOMETRY_EPSILON) {
          return null;
        }

        let ring = -1;
        for (let index = 0; index < RINGS; index += 1) {
          const ringInnerCss = (state.ringRadii[index] / state.radius) * cssRadius;
          const ringOuterCss = (state.ringRadii[index + 1] / state.radius) * cssRadius;
          if (distance >= ringInnerCss - GEOMETRY_EPSILON && distance < ringOuterCss - GEOMETRY_EPSILON) {
            ring = index;
            break;
          }
        }

        if (ring < 0 || ring >= RINGS) {
          return null;
        }
        const brightness = state.ringBrightnesses[ring];

        const angle = normalizeAngle(Math.atan2(dy, dx) + Math.PI / 2 + state.segmentMidpointInset);

        const segment = clamp(Math.floor(angle / state.segmentStep), 0, SEGMENTS - 1);
        const hue = hueForSegment(segment);

        return { hue, brightness, segment, ring };
      }

      function showCanvasTip(text, clientX, clientY) {
        canvasTip.textContent = text;
        canvasTip.style.left = `${clientX}px`;
        canvasTip.style.top = `${clientY}px`;
        canvasTip.classList.add("show");
      }

      function hideCanvasTip() {
        canvasTip.classList.remove("show");
      }

      function handleCanvasMove(event) {
        const picked = pickFromCanvas(event.clientX, event.clientY);
        if (!picked) {
          hideCanvasTip();
          return;
        }

        const paletteRgb = paletteRgbForSegment(picked.segment, picked.ring);
        const rgb = paletteRgb || hsbToRgb(picked.hue, SATURATION, picked.brightness);
        const hex = rgbToHex(rgb);
        showCanvasTip(hex, event.clientX, event.clientY - 6);
      }

      function handleCanvasClick(event) {
        const picked = pickFromCanvas(event.clientX, event.clientY);
        if (!picked) {
          return;
        }
        setSelectionBySegment(picked.segment, picked.brightness, true);
        copyHexValue(selectionHex(), false);
      }

      async function copyHex() {
        if (!state.hasExplicitSelection) {
          copyBtn.textContent = "Select a color";
          setTimeout(function () {
            copyBtn.textContent = "Copy HEX";
          }, 900);
          return;
        }

        const hex = selectionHex();
        await copyHexValue(hex, true);
      }

      function downloadPng() {
        const rgb = selectionColor();
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = 1024;
        exportCanvas.height = 1024;
        const ectx = exportCanvas.getContext("2d");
        ectx.fillStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        const link = document.createElement("a");
        link.download = `color-${selectionHex().slice(1)}.png`;
        link.href = exportCanvas.toDataURL("image/png");
        link.click();
      }

      function handleKey(event) {
        if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.altKey) {
          return;
        }

        const target = event.target;
        if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA")) {
          return;
        }

        let nextHue = state.hue;
        const stepSmall = 1 / 360;
        const stepLarge = 5 / 360;

        switch (event.key) {
          case "ArrowLeft":
            nextHue = state.hue - stepSmall;
            break;
          case "ArrowRight":
            nextHue = state.hue + stepSmall;
            break;
          case "ArrowUp":
            nextHue = state.hue + stepLarge;
            break;
          case "ArrowDown":
            nextHue = state.hue - stepLarge;
            break;
          default:
            return;
        }

        event.preventDefault();
        setSelection(nextHue, state.brightness, false);
      }

      function redrawWheelOnResize() {
        initCanvasSize();
        if (!state.size) {
          return;
        }
        drawWheelBitmap();
        renderSelectionLayer();
      }

      function scheduleWheelResize() {
        if (resizeFrame) {
          window.cancelAnimationFrame(resizeFrame);
        }
        resizeFrame = window.requestAnimationFrame(function () {
          resizeFrame = 0;
          redrawWheelOnResize();
        });
      }

      function init() {
        getQueryState();
        redrawWheelOnResize();
        if (state.selectionMode === "grayscale" && state.selectedGrayHex) {
          setSelectionByGrayHex(state.selectedGrayHex, false);
        } else {
          setSelection(state.hue, state.brightness, false);
        }

        canvas.addEventListener("click", handleCanvasClick);
        canvas.addEventListener("mousemove", handleCanvasMove);
        canvas.addEventListener("mouseleave", hideCanvasTip);
        canvas.addEventListener("blur", hideCanvasTip);

        window.addEventListener("keydown", handleKey);
        if (typeof ResizeObserver === "function") {
          const observer = new ResizeObserver(function () {
            scheduleWheelResize();
          });
          observer.observe(wheelWrap);
        }

        window.addEventListener("resize", scheduleWheelResize);
        copyBtn.addEventListener("click", copyHex);
        downloadBtn.addEventListener("click", downloadPng);
      }

      init();
    })();
  </script>
</body>
</html>
